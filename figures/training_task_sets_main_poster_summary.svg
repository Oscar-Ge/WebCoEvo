<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="620" viewBox="0 0 1040 620">
<style>
.title { font: 700 34px 'Helvetica Neue', Arial, sans-serif; fill: #111827; }
