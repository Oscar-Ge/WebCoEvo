{% load static %}
<!DOCTYPE html>
<html lang="en" data-api-base-url="{% url 'linkding:api-root' %}">
  {% block head %}
    {% include 'shared/head.html' %}
    <style>
      body { background: linear-gradient(180deg, #f6f3ea 0%, #fffdf8 100%); }
      .surface-banner {
        margin: 0 auto 1rem auto;
        padding: 0.75rem 1rem;
        border: 1px solid #c9762b;
        background: #fff1df;
        color: #5f3410;
        font-weight: 600;
      }
      .app-link { gap: 1rem; }
      .app-name { letter-spacing: 0.12em; }
    </style>
  {% endblock %}
  <body>
    <header class="container">
      <div class="surface-banner">Visual refresh active</div>
      <div class="d-flex justify-between">
        <a href="{% url 'linkding:root' %}" class="app-link d-flex align-center">
          <img class="app-logo" src="{% static 'logo.png' %}" alt="Application logo">
          <span class="app-name">LINKDING</span>
        </a>
        <nav>
          {% if request.user.is_authenticated %}
            {% include 'shared/nav_menu.html' %}
          {% else %}
            <a href="{% url 'login' %}" class="btn btn-link">Login</a>
          {% endif %}
        </nav>
      </div>
    </header>
    <div class="content container">
      {% block content %}{% endblock %}
    </div>
    <div class="modals">
      {% block overlays %}{% endblock %}
    </div>
  </body>
</html>
