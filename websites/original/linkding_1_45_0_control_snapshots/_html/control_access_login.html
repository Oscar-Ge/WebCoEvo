
<!DOCTYPE html>

<html lang="en" data-api-base-url="/api/">
  
  
    
<head><base href="http://127.0.0.1:29045/">
  <meta charset="UTF-8">
  <link rel="icon" href="/static/favicon.ico" sizes="48x48">
  <link rel="icon"
        href="/static/favicon.svg"
        sizes="any"
        type="image/svg+xml">
  <link rel="apple-touch-icon"
        sizes="180x180"
        href="/static/apple-touch-icon.png">
  <link rel="mask-icon"
        href="/static/safari-pinned-tab.svg"
        color="#5856e0">
  <link rel="manifest" href="/manifest.json">
  <link rel="search"
        type="application/opensearchdescription+xml"
        title="Linkding"
        href="/opensearch.xml" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimal-ui">
  <meta name="description" content="Self-hosted bookmark service">
  <meta name="robots" content="index,follow">
  <meta name="author" content="Sascha Ißbrücker">
  <title>Login - Linkding</title>
  
  
    
    <link href="/static/theme-dark.css?v=1.45.0"
          rel="stylesheet"
          type="text/css"
          media="(prefers-color-scheme: dark)" />
    <link href="/static/theme-light.css?v=1.45.0"
          rel="stylesheet"
          type="text/css"
          media="(prefers-color-scheme: light)" />
    <meta name="theme-color"
          media="(prefers-color-scheme: dark)"
          content="#161822">
    <meta name="theme-color"
          media="(prefers-color-scheme: light)"
          content="#5856e0">
  
  
  <meta name="turbo-cache-control" content="no-preview">
  <meta name="turbo-prefetch" content="false">
  
  <script src="/static/bundle.js?v=1.45.0"></script>
  
</head>

  

  <body>
    <header class="container">
      
      <div class="d-flex justify-between">
        <a href="/" class="app-link d-flex align-center">
          <img class="app-logo" src="/static/logo.png" alt="Application logo">
          <span class="app-name">LINKDING</span>
        </a>
        <nav>
          
            
            <a href="/login/" class="btn btn-link">Login</a>
          
        </nav>
      </div>
    </header>
    <div class="content container">
      
  <main class="auth-page" aria-labelledby="main-heading">
    <div class="section-header">
      <h1 id="main-heading">Login</h1>
    </div>
    
      <form method="post" action="/login/">
        <input type="hidden" name="csrfmiddlewaretoken" value="SANITIZED_CSRF_TOKEN">
        
        <div class="form-group">
          <label for="id_username" class="form-label">Username</label>
          <input type="text" name="username" autofocus autocapitalize="none" autocomplete="username" maxlength="150" aria-invalid="false" class="form-input" required id="id_username">
        </div>
        <div class="form-group">
          <label for="id_password" class="form-label">Password</label>
          <input type="password" name="password" autocomplete="current-password" aria-invalid="false" class="form-input" required id="id_password">
        </div>
        <input type="submit" value="Login" class="btn btn-primary width-100 mt-4" />
        <input type="hidden" name="next" value="" />
      </form>
    
    
  </main>

    </div>
    <div class="modals">
      
    </div>
  </body>
</html>
